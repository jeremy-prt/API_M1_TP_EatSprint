openapi: "3.0.3"
info:
  title: EatSprint API
  version: "1.0.0"
servers:
  - url: http://localhost:3000

paths:
  /auth/register:
    post:
      summary: Inscription
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  example: user@test.com
                password:
                  type: string
                  example: "123456"
                name:
                  type: string
                  example: John Doe
                address:
                  type: string
                  example: 12 rue de Paris
                city:
                  type: string
                  example: Paris
                zipCode:
                  type: string
                  example: "75001"
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email déjà utilisé

  /auth/login:
    post:
      summary: Connexion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: user@test.com
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Identifiants incorrects

  /auth/refresh:
    post:
      summary: Rafraîchir le token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: coller-le-refresh-token-ici
      responses:
        "200":
          description: Nouveaux tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token invalide ou expiré

  /auth/logout:
    post:
      summary: Déconnexion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: coller-le-refresh-token-ici
      responses:
        "200":
          description: Déconnecté

  /auth/me:
    get:
      summary: Profil utilisateur
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié

  /restaurants:
    get:
      summary: Liste des restaurants
      tags: [Restaurants]
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"
    post:
      summary: Créer un restaurant (ADMIN)
      tags: [Restaurants]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  name,
                  address,
                  city,
                  category,
                  image,
                  cuisine,
                  priceRange,
                  deliveryTimeMin,
                  ownerEmail,
                  ownerPassword,
                  ownerName,
                ]
              properties:
                name:
                  type: string
                  example: Pizza Palace
                address:
                  type: string
                  example: 10 rue de Rome
                city:
                  type: string
                  example: Paris
                category:
                  type: string
                  example: Italien
                image:
                  type: string
                  example: https://img.com/pizza.jpg
                cuisine:
                  type: string
                  example: Pizza
                priceRange:
                  type: string
                  example: "€€"
                deliveryTimeMin:
                  type: integer
                  example: 30
                ownerEmail:
                  type: string
                  example: resto@test.com
                ownerPassword:
                  type: string
                  example: "123456"
                ownerName:
                  type: string
                  example: Chef Luigi
      responses:
        "201":
          description: Restaurant créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
        "409":
          description: Email déjà utilisé

  /restaurants/mine:
    get:
      summary: Mes restaurants (RESTAURANT_OWNER)
      tags: [Restaurants]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste de ses restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  /restaurants/{restaurantId}:
    put:
      summary: Modifier un restaurant (RESTAURANT_OWNER)
      tags: [Restaurants]
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Pizza Palace Deluxe
                address:
                  type: string
                city:
                  type: string
                category:
                  type: string
                image:
                  type: string
                cuisine:
                  type: string
                priceRange:
                  type: string
                deliveryTimeMin:
                  type: integer
      responses:
        "200":
          description: Restaurant modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
        "403":
          description: Pas propriétaire
        "404":
          description: Restaurant introuvable

  /restaurants/{restaurantId}/dishes:
    get:
      summary: Plats d'un restaurant
      tags: [Dishes]
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Liste des plats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dish"
    post:
      summary: Créer un plat (RESTAURANT_OWNER)
      tags: [Dishes]
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  name,
                  price,
                  description,
                  category,
                  calories,
                  preparationTime,
                  isVegetarian,
                  isVegan,
                  isSpicy,
                  isAvailable,
                  image,
                ]
              properties:
                name:
                  type: string
                  example: Margherita
                price:
                  type: number
                  example: 9.5
                description:
                  type: string
                  example: Tomate, mozzarella, basilic
                category:
                  type: string
                  example: Pizza
                calories:
                  type: integer
                  example: 800
                preparationTime:
                  type: integer
                  example: 15
                isVegetarian:
                  type: boolean
                  example: true
                isVegan:
                  type: boolean
                  example: false
                isSpicy:
                  type: boolean
                  example: false
                allergens:
                  type: string
                  nullable: true
                  example: gluten, lactose
                isAvailable:
                  type: boolean
                  example: true
                image:
                  type: string
                  example: https://img.com/margherita.jpg
      responses:
        "201":
          description: Plat créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dish"
        "403":
          description: Pas propriétaire
        "404":
          description: Restaurant introuvable

  /dishes/{dishId}:
    get:
      summary: Détails d'un plat
      tags: [Dishes]
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Plat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dish"
        "404":
          description: Plat introuvable
    put:
      summary: Modifier un plat (RESTAURANT_OWNER)
      tags: [Dishes]
      security:
        - bearerAuth: []
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Margherita Royale
                price:
                  type: number
                  example: 11.5
                description:
                  type: string
                category:
                  type: string
                isAvailable:
                  type: boolean
      responses:
        "200":
          description: Plat modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dish"
        "403":
          description: Pas propriétaire
        "404":
          description: Plat introuvable
    delete:
      summary: Supprimer un plat (RESTAURANT_OWNER)
      tags: [Dishes]
      security:
        - bearerAuth: []
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Supprimé
        "403":
          description: Pas propriétaire
        "404":
          description: Plat introuvable

  /users/me:
    get:
      summary: Mon profil
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
    put:
      summary: Modifier mon profil
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Updated
                email:
                  type: string
                  example: new@test.com
                address:
                  type: string
                  example: 12 rue de Paris
                city:
                  type: string
                  example: Paris
                zipCode:
                  type: string
                  example: "75001"
      responses:
        "200":
          description: Profil modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email déjà utilisé
    delete:
      summary: Supprimer mon compte
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Compte supprimé

  /orders:
    post:
      summary: Créer une commande (CUSTOMER)
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId, items]
              properties:
                restaurantId:
                  type: integer
                  example: 1
                items:
                  type: array
                  items:
                    type: object
                    required: [dishId, quantity]
                    properties:
                      dishId:
                        type: integer
                        example: 1
                      quantity:
                        type: integer
                        example: 2
      responses:
        "201":
          description: Commande créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Données invalides
    get:
      summary: Mes commandes (CUSTOMER)
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des commandes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      summary: Détails d'une commande
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Commande
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          description: Accès interdit
        "404":
          description: Commande introuvable

  /orders/{orderId}/status:
    patch:
      summary: Changer le statut (RESTAURANT_OWNER)
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [CONFIRMED, PREPARING, DELIVERING, DELIVERED]
                  example: CONFIRMED
      responses:
        "200":
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Transition invalide
        "403":
          description: Pas propriétaire du restaurant

  /orders/{orderId}/cancel:
    post:
      summary: Annuler une commande (CUSTOMER)
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Commande annulée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Commande non annulable

  /restaurants/{restaurantId}/orders:
    get:
      summary: Commandes du restaurant (RESTAURANT_OWNER)
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Liste des commandes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "403":
          description: Pas propriétaire

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        zipCode:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
        total:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              orderId:
                type: integer
              dishId:
                type: integer
              quantity:
                type: integer
              unitPrice:
                type: number
              dish:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  image:
                    type: string
    Dish:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        description:
          type: string
        category:
          type: string
        restaurantId:
          type: integer
        calories:
          type: integer
        preparationTime:
          type: integer
        isVegetarian:
          type: boolean
        isVegan:
          type: boolean
        isSpicy:
          type: boolean
        allergens:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        image:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string

    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        category:
          type: string
        image:
          type: string
        cuisine:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        priceRange:
          type: string
        deliveryTimeMin:
          type: integer
        slug:
          type: string
        ownerId:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
