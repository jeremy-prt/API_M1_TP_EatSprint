openapi: "3.0.3"
info:
  title: EatSprint API
  version: "1.0.0"
servers:
  - url: http://localhost:3000

paths:
  /auth/register:
    post:
      summary: Inscription
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  example: user@test.com
                password:
                  type: string
                  example: "123456"
                name:
                  type: string
                  example: John Doe
                address:
                  type: string
                  example: 12 rue de Paris
                city:
                  type: string
                  example: Paris
                zipCode:
                  type: string
                  example: "75001"
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email déjà utilisé

  /auth/login:
    post:
      summary: Connexion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: user@test.com
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Identifiants incorrects

  /auth/refresh:
    post:
      summary: Rafraîchir le token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: coller-le-refresh-token-ici
      responses:
        "200":
          description: Nouveaux tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token invalide ou expiré

  /auth/logout:
    post:
      summary: Déconnexion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: coller-le-refresh-token-ici
      responses:
        "200":
          description: Déconnecté

  /auth/me:
    get:
      summary: Profil utilisateur
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        zipCode:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string
