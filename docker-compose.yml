services:
  api:
    build: .
    ports:
      - "4000:3000"
    environment:
      DATABASE_HOST: mysql
      DATABASE_USER: ${DATABASE_USER:-eatsprint}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-eatsprint}
      DATABASE_NAME: ${DATABASE_NAME:-eatsprint}
      DATABASE_URL: mysql://${DATABASE_USER:-eatsprint}:${DATABASE_PASSWORD:-eatsprint}@mysql:3306/${DATABASE_NAME:-eatsprint}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-7}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-root}
      MYSQL_DATABASE: ${DATABASE_NAME:-eatsprint}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${DATABASE_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

volumes:
  mysql_data:
